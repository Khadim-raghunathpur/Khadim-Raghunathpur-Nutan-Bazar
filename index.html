<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khadim Raghunathpur | Stock Live</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900&family=Work+Sans:wght@400;500;600;700&display=swap');
  :root { --ink:#241610; --paper:#EEE3CF; --card:#FFFDF8; --red:#C81E3A; }
  body { font-family:'Work Sans', sans-serif; background:var(--paper); color:var(--ink); }
  .font-display { font-family:'Fraunces', serif; }
  .tag-card { background:var(--card); border:2px dashed rgba(156,122,60,0.4); border-radius:4px; transition:all .35s ease; }
  .tag-card:hover { transform:translateY(-5px); box-shadow:0 15px 25px -10px rgba(36,22,16,0.2); }
</style>
</head>
<body class="bg-[#EEE3CF]">

  <!-- NAV BAR -->
  <nav class="bg-[#FFFDF8]/95 sticky top-0 z-50 border-b-2 border-amber-800/20 px-5 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-[#C81E3A] font-display">KHADIM</div>
    <a href="https://wa.me/916295777518" target="_blank" class="bg-[#C81E3A] text-white px-5 py-2 rounded-full font-semibold text-sm flex items-center gap-2">
      <i class="fab fa-whatsapp"></i> Chat on WhatsApp
    </a>
  </nav>

  <!-- SEARCH & FILTERS -->
  <section class="max-w-6xl mx-auto px-5 pt-10">
    <div class="bg-[#FFFDF8] p-6 rounded-lg border-2 border-dashed border-amber-800/30 flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
      <div class="w-full md:w-1/2 relative">
        <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
        <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="Search shoes, sandals, belts..." class="w-full pl-11 pr-4 py-2.5 rounded-full border border-amber-800/30 bg-amber-50/20 focus:outline-none focus:border-[#C81E3A] text-sm">
      </div>
      <div class="flex flex-wrap gap-2 justify-end w-full md:w-1/2" id="filter-buttons">
        <button onclick="filterType('all', this)" class="px-4 py-1.5 rounded-full text-xs bg-[#241610] text-white font-semibold">ALL</button>
        <button onclick="filterType('GENTS', this)" class="px-4 py-1.5 rounded-full text-xs bg-white border border-amber-800/30 font-semibold text-amber-900">MEN</button>
        <button onclick="filterType('LADIES', this)" class="px-4 py-1.5 rounded-full text-xs bg-white border border-amber-800/30 font-semibold text-amber-900">WOMEN</button>
        <button onclick="filterType('KIDS', this)" class="px-4 py-1.5 rounded-full text-xs bg-white border border-amber-800/30 font-semibold text-amber-900">KIDS</button>
      </div>
    </div>
  </section>

  <!-- CATALOG GRID -->
  <section class="max-w-6xl mx-auto px-5 py-10">
    <div class="mb-6 flex justify-between items-baseline flex-wrap gap-2">
      <div>
        <h2 class="font-display text-3xl font-bold">The Collection</h2>
        <p class="text-xs text-amber-900/70 font-mono mt-1">Live Connected Store Catalog (Via Assets)</p>
      </div>
      <span id="product-count" class="text-xs font-mono bg-[#241610]/10 px-3 py-1 rounded-full font-bold">Processing Files...</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="excel-catalog">
      <p class="col-span-full text-center py-10 font-mono text-sm">Syncing stock data with official image mapping...</p>
    </div>
  </section>

  <!-- SHOWROOM GALLERY -->
  <section class="max-w-6xl mx-auto px-5 py-12 border-t-2 border-amber-800/10">
    <h2 class="font-display text-3xl font-bold mb-6">Inside the Showroom</h2>
    <div class="sk-ww-google-business-photo" data-embed-id="25696036"></div>
    <script src="https://widgets.sociablekit.com/google-business-photos/widget.js" defer></script>
  </section>

  <script>
    // স্পেসের ঝামেলা এড়াতে আমরা সরাসরি অবজেক্ট কোড দিয়ে ডিরেক্ট পাথ করে দিলাম
    const COMPANY_FILE_URL = 'https://raw.githubusercontent.com/Khadim-raghunathpur/assets/main/runing%20list%20%20april%20%202026.xlsx';
    const STORE_FILE_URL = 'https://raw.githubusercontent.com/Khadim-raghunathpur/assets/main/physical%20stock%2009.07.2026.xlsx';

    let allProducts = [];
    let currentFilter = 'all';

    async function fetchExcelJson(url) {
      const response = await fetch(url);
      if (!response.ok) {
        // যদি ডবল স্পেসের কারণে ফাইল না পায়, তবে সিঙ্গেল স্পেসের অল্টারনেটিভ ট্রাই করবে ব্যাকআপ হিসেবে
        const backupUrl = url.replace(/%20%20/g, '%20');
        const backupResponse = await fetch(backupUrl);
        if (!backupResponse.ok) throw new Error('File fetch failed');
        return processBuffer(await backupResponse.arrayBuffer());
      }
      return processBuffer(await response.arrayBuffer());
    }

    function processBuffer(arrayBuffer) {
      const data = new Uint8Array(arrayBuffer);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];
      return XLSX.utils.sheet_to_json(worksheet, { header: 1 });
    }

    async function initializeCatalog() {
      try {
        const [companyRows, storeRows] = await Promise.all([
          fetchExcelJson(COMPANY_FILE_URL),
          fetchExcelJson(STORE_FILE_URL)
        ]);

        let companyMap = {};
        companyRows.forEach(row => {
          const item11 = row[0] ? row[0].toString().trim() : '';
          const item7 = row[1] ? row[1].toString().trim() : '';
          const mcName = row[3] ? row[3].toString().trim() : '';
          
          if (item7) companyMap[item7] = mcName;
          if (item11) companyMap[item11] = mcName;
        });

        let lastParentGroup = 'KHADIMS';
        
        storeRows.forEach(row => {
          const currentGroup = row[1] ? row[1].toString().trim() : '';
          const itemCode = row[2] ? row[2].toString().trim() : '';
          const itemName = row[4] ? row[4].toString().trim() : '';
          const stockQty = parseInt(row[10]) || 0;
          const mrp = row[14] || '0';

          if (currentGroup && currentGroup !== '' && !currentGroup.includes("Parent") && !currentGroup.includes("Item")) {
            lastParentGroup = currentGroup;
          }

          if (!itemCode || itemCode === "Item Code" || itemCode.includes("Sub Total") || stockQty <= 0) return;

          let cleanCode = itemCode.replace(/[^0-9]/g, '');
          let fullCode = cleanCode;
          if (cleanCode.length > 7) {
            cleanCode = cleanCode.substring(0, 7);
          }

          let finalName = companyMap[cleanCode] || companyMap[fullCode] || itemName || 'Footwear Collection';

          if (cleanCode.length >= 5) {
            allProducts.push({
              code: cleanCode,
              fullCode: fullCode,
              category: finalName,
              group: lastParentGroup,
              price: mrp,
              stock: stockQty
            });
          }
        });

        renderCatalog(allProducts);
      } catch (error) {
        console.error(error);
        document.getElementById('excel-catalog').innerHTML = '<p class="col-span-full text-center font-mono text-red-600">Error reading files. Please check back in 1 minute.</p>';
      }
    }

    function renderCatalog(products) {
      const catalog = document.getElementById('excel-catalog');
      const countLabel = document.getElementById('product-count');
      catalog.innerHTML = '';
      
      if(products.length === 0) {
        catalog.innerHTML = '<p class="col-span-full text-center py-10 font-mono text-sm text-gray-500">No active products found in stock.</p>';
        countLabel.innerText = '0 Items';
        return;
      }

      countLabel.innerText = `${products.length} Items`;

      products.forEach(p => {
        const imgUrl = `https://khadims.com/images/products/${p.code}.jpg`;
        const waText = encodeURIComponent(`Hello Khadim Raghunathpur! I want to check size availability for "${p.category}" (Article Code: ${p.fullCode}).`);

        catalog.innerHTML += `
          <div class="tag-card p-4 flex flex-col justify-between">
            <div>
              <div class="w-full h-44 bg-white flex items-center justify-center rounded overflow-hidden mb-3 border p-2">
                <img src="${imgUrl}" alt="${p.category}" class="object-contain max-h-full max-w-full" onerror="this.src='https://picsum.photos/400/300?seed=${p.code}';">
              </div>
              <span class="text-[10px] uppercase font-mono tracking-wider text-amber-800 bg-amber-800/10 px-2 py-0.5 rounded">${p.group}</span>
              <h3 class="font-display font-bold text-sm mt-2 leading-tight text-[#241610]">${p.category}</h3>
              <p class="text-xs text-gray-500 font-mono mt-1">Code: ${p.fullCode}</p>
            </div>
            <div class="flex justify-between items-center mt-4 pt-3 border-t border-dashed border-amber-800/20">
              <span class="font-mono text-base font-bold text-[#C81E3A]">₹${p.price}</span>
              <a href="https://wa.me/916295777518?text=${waText}" target="_blank" class="bg-[#241610] text-white text-[10px] px-2.5 py-2 rounded-full flex items-center gap-1 font-semibold hover:bg-[#C81E3A] transition-all">
                <i class="fab fa-whatsapp text-sm"></i> Sizes?
              </a>
            </div>
          </div>
        `;
      });
    }

    function searchProducts() {
      const searchVal = document.getElementById('search-input').value.toLowerCase();
      const filtered = allProducts.filter(p => {
        const matchesSearch = `${p.category} ${p.group} ${p.fullCode}`.toLowerCase().includes(searchVal);
        let matchesFilter = false;
        if (currentFilter === 'all') matchesFilter = true;
        else if (currentFilter === 'GENTS') matchesFilter = p.group.toUpperCase().includes('GENTS') || p.group.toUpperCase().includes('MENS');
        else if (currentFilter === 'LADIES') matchesFilter = p.group.toUpperCase().includes('LADIES') || p.group.toUpperCase().includes('WOMEN');
        else if (currentFilter === 'KIDS') matchesFilter = p.group.toUpperCase().includes('BOYS') || p.group.toUpperCase().includes('KIDS') || p.group.toUpperCase().includes('GIRLS') || p.group.toUpperCase().includes('SCHOOL');
        return matchesSearch && matchesFilter;
      });
      renderCatalog(filtered);
    }

    function filterType(type, btn) {
      currentFilter = type;
      document.querySelectorAll('#filter-buttons button').forEach(b => {
        b.classList.remove('bg-[#241610]', 'text-white');
        b.classList.add('bg-white', 'text-amber-900');
      });
      btn.classList.add('bg-[#241610]', 'text-white');
      searchProducts();
    }

    window.onload = initializeCatalog;
  </script>
</body>
</html>
